<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Message Sent — MAYA ಮಾಯಾ</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Bebas+Neue&family=Noto+Sans+Kannada:wght@300;400&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #080808;
    color: #e8e4dc;
    font-family: 'Cormorant Garamond', serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem;
  }
  .success-box {
    max-width: 540px;
  }
  .check {
    font-size: 3rem;
    margin-bottom: 1.5rem;
    animation: pop 0.5s ease;
  }
  @keyframes pop {
    from { transform: scale(0); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  .title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 3rem;
    letter-spacing: 0.1em;
    color: #c9a84c;
    line-height: 1;
    margin-bottom: 0.5rem;
  }
  .kannada {
    font-family: 'Noto Sans Kannada', sans-serif;
    font-size: 1rem;
    color: #7a7a80;
    letter-spacing: 0.2em;
    margin-bottom: 2rem;
  }
  .divider {
    width: 60px; height: 1px;
    background: linear-gradient(to right, transparent, #c9a84c, transparent);
    margin: 0 auto 2rem;
  }
  p {
    font-size: 1.15rem;
    font-weight: 300;
    line-height: 1.8;
    color: #9a9690;
    margin-bottom: 1rem;
  }
  p strong { color: #c9a84c; font-weight: 600; }
  .back-btn {
    display: inline-block;
    margin-top: 2rem;
    border: 1px solid #c9a84c;
    color: #c9a84c;
    padding: 0.9rem 2.5rem;
    font-family: 'Bebas Neue', sans-serif;
    letter-spacing: 0.2em;
    font-size: 1rem;
    text-decoration: none;
    transition: all 0.3s;
  }
  .back-btn:hover {
    background: #c9a84c;
    color: #080808;
  }
</style>
</head>
<body>
  <div class="success-box">
    <div class="check">✉️</div>
    <div class="title">MAYA</div>
    <div class="kannada">ಮಾಯಾ</div>
    <div class="divider"></div>
    <p><strong>Thank you for reaching out!</strong></p>
    <p>Your message has been received. The Maya team will get back to you as soon as possible.</p>
    <p>Every person who believes in this vision brings us one step closer to making <em>Maya</em> a reality.</p>
    <a href="/" class="back-btn">← Back to Maya</a>
  </div>
</body>
</html>
